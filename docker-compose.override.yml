# Local-only overrides (docker-compose.override.yml is auto-merged by
# `docker compose` locally). Servers deploy with `-f docker-compose.yml` to skip it.
services:
  # Run nginx as root to avoid bind-mount permission issues on macOS.
  widget-test-site:
    volumes:
      - ./widget-test:/usr/share/nginx/html:ro
      - ./widget-test-nginx.conf:/etc/nginx/nginx.conf:ro

