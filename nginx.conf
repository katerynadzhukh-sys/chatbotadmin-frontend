server {
    listen 80;
    server_name localhost;

    # Forward API calls to the Go backend (auth + model proxy). The backend
    # service must share this container's Docker network (see docs/DEPLOYMENT.md).
    # The variable upstream + Docker embedded DNS resolver (127.0.0.11) means
    # Nginx still starts if no backend is present (e.g. widget-only testing) —
    # /api just returns 502 instead of the server failing to boot.
    location /api/ {
        resolver 127.0.0.11 valid=10s;
        set $api_upstream http://backend:8080;
        proxy_pass $api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;   # chat streaming (SSE)
        proxy_buffering off;
    }

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
