server {
    listen 80;
    server_name sv90073.hrz.uni-giessen.de;
    
    # Redirect HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name sv90073.hrz.uni-giessen.de;

    # SSL Certificates (mounted via docker-compose)
    ssl_certificate /etc/nginx/ssl/sv90073.pem;
    ssl_certificate_key /etc/nginx/ssl/priv.pem;

    # Modern SSL configurations
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';

    # Forward API calls to the Go backend (auth + model proxy). The backend
    # service must share this container's Docker network (see docs/DEPLOYMENT.md).
    # The variable upstream + Docker embedded DNS resolver (127.0.0.11) means
    # Nginx still starts if the backend is temporarily down — /api returns 502
    # instead of the whole server failing to boot.
    location /api/ {
        resolver 127.0.0.11 valid=10s;
        set $api_upstream http://backend:8080;
        proxy_pass $api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;   # backend marks OIDC cookies Secure
        proxy_read_timeout 300s;                       # chat streaming (SSE)
        proxy_buffering off;                           # stream tokens promptly
    }

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
