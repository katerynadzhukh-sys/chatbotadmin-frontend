name: Build and Publish Docker Images

on:
  push:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    # One job per image. The frontend builds from the repo root; the backend
    # builds from go-backend/ so staging/prod can pull it instead of compiling
    # Go on the server (which fails behind the HRZ proxy).
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: chatbotadmin-frontend
            context: .
            file: Dockerfile
          - name: chatbotadmin-backend
            context: ./go-backend
            file: ./go-backend/Dockerfile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # GHCR requires lowercase repository/image names.
      - name: Compute lowercase image name
        env:
          OWNER: ${{ github.repository_owner }}
        run: echo "IMAGE=${REGISTRY}/${OWNER,,}/${{ matrix.name }}" >> "$GITHUB_ENV"

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=ref,event=branch
            type=sha,format=short
            latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Per-image cache scope so the two builds don't evict each other.
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
